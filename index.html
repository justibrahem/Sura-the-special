<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
    body {
        text-align: center;
        font-family: Arial;
        background: linear-gradient(to right, #ffe6f0, #fff0f5);
        margin-top: 100px;
        overflow: hidden;
    }

    h2 {
        color: #cc0066;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        background-color: #ff66a3;
        color: white;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #ff3385;
        transform: scale(1.1);
    }

    #message {
        margin-top: 30px;
        font-size: 26px;
        color: #cc0066;
        font-weight: bold;
        transition: 0.3s;
    }

    .emoji {
        position: absolute;
        font-size: 24px;
        animation: float 3s linear forwards;
    }

    @keyframes float {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(-250px);
            opacity: 0;
        }
    }

    .footer {
        position: fixed;
        bottom: 10px;
        right: 15px;
        font-size: 12px;
        color: #777;
    }
</style>
</head>

<body>

<h2>💖 Press the button 👇</h2>

<button onclick="showMessage()">hey doc, its me Ibrahem, press me 😄</button>

<p id="message">Click the button 😊</p>

<div class="footer">designed by me specially to you</div>

<script>
    const messages = [
        "🦷💖 You are the best doctor ever!",
        "😊✨ Keep your smile on, always!",
        "💫🦷 Your pretty smile is made to make others smile, and that's a bliss!",
        "🌸💖 Your energy is wonderful, don't let others ruin it!",
        "🐱✨ Maybe in another universe, we're cats... just eat, sleep, and meow 😆🦷🐱 But for sure... you'll be a doctor cat!",
        "💘🌟 You make everything around you brighter!",
               "بطاطا المجمع ازكى بكثير من بطاطا المول، بطاطا المول بتتاكلش",
        "🌈💖 Stay as amazing as you are!"
    ];

    const emojis = ["💖","🦷","✨","🌸","🐱","💫","🌟"];

    function showMessage() {
        const msg = document.getElementById("message");

        msg.textContent = messages[Math.floor(Math.random() * messages.length)];

        // تأثير بسيط للنص
        msg.style.transform = "scale(1.1)";
        setTimeout(() => {
            msg.style.transform = "scale(1)";
        }, 200);

        // إيموجي كيوت
        for (let i = 0; i < 12; i++) {
            const e = document.createElement("div");
            e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            e.className = "emoji";

            e.style.left = Math.random() * window.innerWidth + "px";
            e.style.top = "300px";

            document.body.appendChild(e);

            setTimeout(() => e.remove(), 3000);
        }
    }
</script>

</body>
</html>
